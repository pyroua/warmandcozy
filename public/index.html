<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Schoonmaak Warm and Cozy</title>
  <script>
    // Redirect to preferred locale based on browser language
    const lang = navigator.language?.substring(0, 2) || 'nl';
    const supported = ['nl', 'en', 'fr'];
    const locale = supported.includes(lang) ? lang : 'nl';
    window.location.replace('/' + locale + '/');
  </script>
  <meta http-equiv="refresh" content="0;url=/nl/">
</head>
<body>
  <a href="/nl/">Klik hier / Click here</a>
</body>
</html>
